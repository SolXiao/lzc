<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caddy Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Apply Inter font globally */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Optional: Style for the logo if needed */
        .logo {
            width: 80px; /* Adjust size as needed */
            height: 80px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 text-gray-800">
    <div class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 sm:p-12 rounded-xl shadow-lg text-center max-w-lg w-full">

            <div class="mb-6 flex justify-center">
                <img class="logo" src="./icon.png" alt="Caddy Logo" />
            </div>

            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-3">
                Caddy is now running
            </h1>

            <p class="text-base sm:text-lg text-gray-600">
                Please update the <code class="bg-gray-200 text-gray-800 px-1.5 py-0.5 rounded text-sm font-mono">Caddyfile</code> in the <code class="bg-gray-200 text-gray-800 px-1.5 py-0.5 rounded text-sm font-mono">Caddyfile</code> directory under your home folder.
            </p>

        </div>
         <p class="mt-8 text-sm text-gray-500">
            Developed by <a href="https://github.com/zwpaper" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline">Kweizh</a>. &copy; 2025
        </p>
    </div>
</body>
</html>
